      <h2>Адреса організації</h2>

      <address>

        Україна

    <div>
      <h3>Схема «Як дістатися»</h3>

    <div>
      <h4>Зворотній зв'язок</h4>

      <form action="https://tests.fomenko.top/echo/index.php" method="GET">
        <fieldset>
          <legend>Напишіть нам</legend>

          <div>
            <label for="contact-name">Ім'я:</label>
            <input type="text" id="contact-name" name="contact-name" placeholder="Ваше ім'я" required>
          </div>

          <div>
            <label for="contact-email">Email:</label>
            <input type="email" id="contact-email" name="contact-email" placeholder="Ваш email" required>
          </div>

          <div>
            <label for="contact-question">Задайте питання:</label>
            <textarea id="contact-question" name="contact-question" placeholder="Ваше запитання..." required></textarea>
          </div>

          <div>
            <button type="submit">Відправити</button>
            <button type="reset">Очистити</button>
          </div>

        </fieldset>
      </form>
    </div>
